config-version = 2

# Run Sketchybar together with AeroSpace
# sketchybar has a built-in detection of already running process,
# so it won't be run twice on AeroSpace restart
after-startup-command = ['exec-and-forget sketchybar']

# Notify Sketchybar about workspace change
exec-on-workspace-change = [
  '/bin/bash',
  '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE',
]

start-at-login = true

# Normalizations (flatten single-child containers, alternate orientation for nested)
enable-normalization-flatten-containers = false
enable-normalization-opposite-orientation-for-nested-containers = true

automatically-unhide-macos-hidden-apps = false

# Move mouse to focused monitor center when switching monitors
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# BSP-equivalent: auto-split tiling
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

accordion-padding = 10

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 10
inner.vertical = 10
outer.left = 8
outer.bottom = 8
outer.top = [
  { monitor."Built-in Retina Display" = 20 },
  48,
] # 40px sketchybar + 8px padding (20 on macbook)
outer.right = 8

[mode.main.binding]
# Launch terminal
alt-enter = 'exec-and-forget /opt/homebrew/bin/alacritty'

# Focus window
alt-h = 'focus --boundaries all-monitors-outer-frame --boundaries-action wrap-around-all-monitors left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus --boundaries all-monitors-outer-frame --boundaries-action wrap-around-all-monitors right'

# Move window (crosses monitor boundary at edge)
alt-shift-h = 'exec-and-forget ~/.config/aerospace/move-with-monitor.sh left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'exec-and-forget ~/.config/aerospace/move-with-monitor.sh right'

# Balance window sizes
alt-shift-0 = 'balance-sizes'

# Switch workspace (moves empty workspace to current monitor first)
alt-1 = 'exec-and-forget ~/.config/aerospace/switch-workspace.sh 1'
alt-2 = 'exec-and-forget ~/.config/aerospace/switch-workspace.sh 2'
alt-3 = 'exec-and-forget ~/.config/aerospace/switch-workspace.sh 3'
alt-4 = 'exec-and-forget ~/.config/aerospace/switch-workspace.sh 4'
alt-5 = 'exec-and-forget ~/.config/aerospace/switch-workspace.sh 5'
alt-6 = 'exec-and-forget ~/.config/aerospace/switch-workspace.sh 6'
alt-7 = 'exec-and-forget ~/.config/aerospace/switch-workspace.sh 7'
alt-8 = 'exec-and-forget ~/.config/aerospace/switch-workspace.sh 8'
alt-9 = 'exec-and-forget ~/.config/aerospace/switch-workspace.sh 9'

# Move window to workspace and follow (moves empty workspace to current monitor first)
alt-shift-1 = 'exec-and-forget ~/.config/aerospace/move-to-workspace.sh 1'
alt-shift-2 = 'exec-and-forget ~/.config/aerospace/move-to-workspace.sh 2'
alt-shift-3 = 'exec-and-forget ~/.config/aerospace/move-to-workspace.sh 3'
alt-shift-4 = 'exec-and-forget ~/.config/aerospace/move-to-workspace.sh 4'
alt-shift-5 = 'exec-and-forget ~/.config/aerospace/move-to-workspace.sh 5'
alt-shift-6 = 'exec-and-forget ~/.config/aerospace/move-to-workspace.sh 6'
alt-shift-7 = 'exec-and-forget ~/.config/aerospace/move-to-workspace.sh 7'
alt-shift-8 = 'exec-and-forget ~/.config/aerospace/move-to-workspace.sh 8'
alt-shift-9 = 'exec-and-forget ~/.config/aerospace/move-to-workspace.sh 9'

# Toggle fullscreen
alt-f = 'fullscreen'

ctrl-shift-h = ['join-with left', 'layout v_accordion']
ctrl-shift-j = ['join-with down', 'layout v_accordion']
ctrl-shift-k = ['join-with up', 'layout v_accordion']
ctrl-shift-l = ['join-with right', 'layout v_accordion']

alt-shift-c = ['reload-config', 'exec-and-forget sketchybar --reload']

# Close window
alt-q = 'close'

# Toggle split orientation (horizontal ↔ vertical)
alt-w = 'layout tiles horizontal vertical'

ctrl-shift-n = 'focus --boundaries workspace --boundaries-action wrap-around-the-workspace dfs-next'
ctrl-shift-p = 'focus --boundaries workspace --boundaries-action wrap-around-the-workspace dfs-prev'

alt-r = 'mode resize'

[mode.resize.binding]
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
enter = 'mode main'
esc = 'mode main'

# Floating window rules
[[on-window-detected]]
if.app-name-regex-substring = 'LuLu|Calculator|Software Update|Dictionary|VLC|System Preferences|System Settings|Photo Booth|Archive Utility|App Store|Activity Monitor|Calendar|CopyQ'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'Finder'
if.window-title-regex-substring = 'Co(py|nnect)|Move|Info|Pref'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'System Information'
if.window-title-regex-substring = 'About This Mac'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'Inkscape'
if.window-title-regex-substring = 'Select file to save to'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'PhpStorm'
if.window-title-regex-substring = 'Evaluate|Select Classes To Import|Settings|Copy Class|Choose methods? to implement|Rename|Add File to Git|Create New PHP Test for .*'
run = 'layout floating'
